services:
  - type: web
    name: pakistan-campaign-api
    runtime: python
    pythonVersion: "3.11"
    buildCommand: "pip install -r requirements.txt && python -m flask db upgrade"
    startCommand: "gunicorn -w 4 -b 0.0.0.0:$PORT app.wsgi:app"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: app:create_app
      - key: DATABASE_URL
        fromDatabase:
          name: postgres-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: postgres-db
    databaseName: pakistan_campaign
    user: postgres
    plan: free
